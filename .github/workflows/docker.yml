name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - 'packages/api-server/**'
      - 'packages/shipgate-dashboard/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/api-server/**'
      - 'packages/shipgate-dashboard/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-api-server:
    name: Build API Server Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/api-server/Dockerfile
          push: false
          tags: shipgate/api-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dashboard:
    name: Build Dashboard Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: shipgate/dashboard:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [build-api-server, build-dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://shipgate:shipgate@postgres:5432/shipgate
          JWT_SECRET=test-jwt-secret-ci-only
          NODE_ENV=test
          DASHBOARD_PORT=3001
          DASHBOARD_CORS_ORIGIN=http://localhost:3001
          EOF

      - name: Build and start services
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for services
        run: |
          echo "Waiting for API server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
              echo "API server is up"
              break
            fi
            sleep 2
          done

      - name: Health check
        run: |
          curl -sf http://localhost:4000/health | jq .
          echo "Docker Compose smoke test passed"

      - name: Cleanup
        if: always()
        run: docker compose down -v
